services:
    mongodb:
        image: mongo:7
        container_name: mongodb
        restart: always
        ports:
            - '27017:27017'
        volumes:
            - mongo_data:/data/db
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
            MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'mongosh --quiet --username "$$MONGO_INITDB_ROOT_USERNAME" --password "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --eval "quit(db.adminCommand({ ping: 1 }).ok ? 0 : 2)"',
                ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 10s

    api-nest:
        build:
            context: ./services/api-nest
            dockerfile: Dockerfile
        container_name: api-nest
        restart: always
        ports:
            - '3000:3000'
        env_file:
            - ./services/api-nest/.env
        environment:
            WORKER_API_TOKEN: ${WORKER_API_TOKEN}
        volumes:
            - ./services/api-nest:/app
            - /app/node_modules
        depends_on:
            mongodb:
                condition: service_healthy
        healthcheck:
            test:
                [
                    'CMD',
                    'node',
                    '-e',
                    "fetch('http://localhost:3000/api/v1/gdash/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
                ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 20s

    rabbitmq:
        image: rabbitmq:3-management
        container_name: rabbitmq
        restart: always
        ports:
            - '5672:5672'
            - '15672:15672'
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
        healthcheck:
            test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 10s

    python-producer:
        build:
            context: ./services/python-producer/core-python
            dockerfile: Dockerfile
        container_name: python-producer
        restart: always
        depends_on:
            rabbitmq:
                condition: service_healthy
        env_file:
            - ./services/python-producer/core-python/.env
        healthcheck:
            test: ['CMD-SHELL', 'kill -0 1']
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s

    go-worker:
        build:
            context: ./services/go-worker
            dockerfile: Dockerfile
        container_name: go-worker
        restart: always
        depends_on:
            rabbitmq:
                condition: service_healthy
            api-nest:
                condition: service_healthy
        env_file:
            - ./services/go-worker/.env
        environment:
            WORKER_API_TOKEN: ${WORKER_API_TOKEN}
        healthcheck:
            test: ['CMD-SHELL', 'kill -0 1']
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s

    frontend:
        build:
            context: ./services/frontend/desafio-gdash-2025-02
            dockerfile: Dockerfile
        container_name: frontend
        restart: always
        ports:
            - '5173:5173'
        depends_on:
            api-nest:
                condition: service_healthy
        env_file:
            - ./services/frontend/desafio-gdash-2025-02/.env
        volumes:
            - ./services/frontend/desafio-gdash-2025-02:/app
            - /app/node_modules
        healthcheck:
            test:
                [
                    'CMD',
                    'node',
                    '-e',
                    "fetch('http://localhost:5173').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
                ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 20s

volumes:
    mongo_data:
